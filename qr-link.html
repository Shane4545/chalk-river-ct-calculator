<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QR — Chalk River CT operator guide</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background: #eef4f1;
      color: #142b40;
    }
    h1 {
      font-size: 1.15rem;
      font-weight: 700;
      margin: 0 0 0.35rem;
      text-align: center;
    }
    .sub {
      font-size: 0.85rem;
      color: #4a6678;
      margin: 0 0 1.25rem;
      text-align: center;
      max-width: 22rem;
    }
    #qrcode {
      display: inline-block;
      padding: 0.75rem;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 28px rgba(22, 58, 86, 0.1);
    }
    #qrcode img {
      display: block;
    }
    .url {
      margin-top: 1.25rem;
      font-size: 0.75rem;
      color: #4a6678;
      word-break: break-all;
      max-width: 20rem;
      text-align: center;
      line-height: 1.4;
    }
    a {
      color: #009e4f;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <h1>Scan to open the site</h1>
  <p class="sub">Chalk River WTP — operator guide (Guide · Manual CT · Live CT tabs)</p>
  <div id="qrcode" aria-label="QR code linking to operator guide"></div>
  <p class="url" id="urlLine"></p>
  <p class="sub" style="margin-top:1.5rem;font-size:0.8rem">
    <a href="operator-guide.html?v=20260328">Open in browser</a> ·
    <a href="operator-guide.html?v=20260328#live-ct">Live CT only</a>
  </p>
  <script src="https://unpkg.com/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script>
    (function () {
      /* Always encode the public Pages URL so a phone scan works from a printout or local file. */
      var base = "https://shane4545.github.io/chalk-river-ct-calculator/operator-guide.html?v=20260328";
      document.getElementById("urlLine").textContent = base;
      new QRCode(document.getElementById("qrcode"), {
        text: base,
        width: 256,
        height: 256,
        correctLevel: QRCode.CorrectLevel.M,
      });
    })();
  </script>
</body>
</html>
